services:
  - type: web
    name: video-trim
    runtime: python
    repo: https://github.com/bijit-create/video-trim
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PORT
        value: "10000"
    buildPacks:
      - ffmpeg
